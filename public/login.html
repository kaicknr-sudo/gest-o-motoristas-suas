<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Gestão de Motoristas SUAS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow p-4" style="max-width: 420px; width: 100%;">
      <h3 class="text-center text-primary">Gestão de Motoristas SUAS</h3>
      <p class="text-center text-muted">Assistência Social</p>

      <input id="phone" class="form-control mb-3" placeholder="Telefone">
      <input id="password" type="password" class="form-control mb-3" placeholder="Senha">

      <button class="btn btn-success w-100" onclick="login()">Entrar</button>
    </div>
  </div>

  <script>
  async function login() {
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!phone || !password) {
      alert("Digite telefone e senha.");
      return;
    }

    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone, password })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.message || "Erro ao fazer login.");
        return;
      }

      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));

      if (data.user.role === "admin" || data.user.role === "superadmin") {
        window.location.href = "/admin";
      } else {
        window.location.href = "/motorista";
      }

    } catch (error) {
      alert("Erro de conexão com o servidor.");
      console.error(error);
    }
  }
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Motorista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary p-3">
    <span class="navbar-brand">Minha Escala</span>
    <button class="btn btn-light btn-sm" onclick="logout()">Sair</button>
  </nav>

  <div class="container py-4">

    <h4>Minhas Viagens</h4>
    <div id="myTrips" class="mb-4"></div>

    <h4>Enviar Alerta de Manutenção</h4>
    <div class="card p-3">
      <select id="vehicleSelect" class="form-select mb-2"></select>

      <select id="alertType" class="form-select mb-2">
        <option>Lavagem</option>
        <option>Óleo</option>
        <option>Abastecimento</option>
        <option>Outro</option>
      </select>

      <textarea id="description" class="form-control mb-2" placeholder="Descreva o problema ou necessidade"></textarea>

      <button class="btn btn-warning" onclick="sendAlert()">Enviar Alerta</button>
    </div>

  </div>

  <script>
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "/";
    }

    function logout() {
      localStorage.clear();
      window.location.href = "/";
    }

    async function api(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token,
          ...(options.headers || {})
        }
      });
    }

    async function loadDriverData() {
      const tripsRes = await api("/api/trips");
      const vehiclesRes = await api("/api/vehicles");

      const trips = await tripsRes.json();
      const vehicles = await vehiclesRes.json();

      myTrips.innerHTML = trips.map(t => `
        <div class="card p-3 mb-2">
          <strong>${t.destination}</strong>
          <p class="mb-1">Data: ${t.dateTime}</p>
          <p class="mb-1">Carro: ${t.vehicle}</p>
          <p class="mb-1">Passageiros: ${t.passengers}</p>
          ${t.hasChild ? `<div class="alert alert-warning p-2">${t.childAlert}</div>` : ""}
        </div>
      `).join("");

      vehicleSelect.innerHTML = vehicles.map(v =>
        `<option value="${v.id}">${v.model} - ${v.plate}</option>`
      ).join("");
    }

    async function sendAlert() {
      await api("/api/maintenance-alerts", {
        method: "POST",
        body: JSON.stringify({
          vehicleId: Number(vehicleSelect.value),
          type: alertType.value,
          description: description.value
        })
      });

      alert("Alerta enviado para o administrador!");
      description.value = "";
    }

    loadDriverData();
  </script>
</body>
</html>
